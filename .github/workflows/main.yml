name: MoviFile Production CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
              set -e
              
              echo "--- Starting Deployment ---"
              mkdir -p ${{ secrets.DEPLOY_PATH }}
              cd ${{ secrets.DEPLOY_PATH }}
              
              # Pull latest code
              if [ ! -d ".git" ]; then
                git clone https://github.com/basit2023/file-converter.git .
              else
                git fetch origin main
                git reset --hard origin/main
              fi
              
              echo "--- Environment Setup ---"
              echo "${{ secrets.FRONTEND_ENV }}" > frontend/.env.production
              echo "${{ secrets.BACKEND_ENV }}" > backend/.env
              
              # =========================
              # FRONTEND SETUP
              # =========================
              echo "--- Building Frontend ---"
              cd frontend
              npm install
              npm run build
              
              # =========================
              # BACKEND SETUP
              # =========================
              echo "--- Installing Backend Dependencies ---"
              cd ../backend
              npm install
              
              # =========================
              # PM2 PROCESS MANAGEMENT
              # =========================
              echo "--- Restarting PM2 Services ---"
              
              # Restart or Start Backend
              pm2 restart movifile-backend --update-env || pm2 start server.js --name movifile-backend --cwd ${{ secrets.DEPLOY_PATH }}/backend
              
              # Restart or Start Frontend
              pm2 restart movifile-frontend --update-env || pm2 start "npm start" --name movifile-frontend --cwd ${{ secrets.DEPLOY_PATH }}/frontend
              
              # Save PM2 processes
              pm2 save
              
              echo "--- Deployment Successful ---"
              pm2 status
