name: MoviFile Production CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
              set -e
              
              echo "--- Starting Deployment ---"
              mkdir -p ${{ secrets.DEPLOY_PATH }}
              cd ${{ secrets.DEPLOY_PATH }}
              
              # Pull latest code
              if [ ! -d ".git" ]; then
                git clone https://github.com/basit2023/file-converter.git .
              else
                git fetch origin main
                git reset --hard origin/main
              fi
              
              echo "--- Environment Setup ---"
              echo "${{ secrets.FRONTEND_ENV }}" > frontend/.env.production
              echo "${{ secrets.BACKEND_ENV }}" > backend/.env
              
              # =========================
              # INSTALL PUPPETEER SYSTEM DEPENDENCIES
              # =========================
              echo "--- Installing System Dependencies for Chromium ---"
              sudo apt-get update -qq
              sudo apt-get install -y -qq libx11-xcb1 libxcomposite1 libxcursor1 libxdamage1 \
                libxi6 libxtst6 libnss3 libcups2 libxss1 libxrandr2 libasound2 \
                libatk1.0-0 libatk-bridge2.0-0 libpangocairo-1.0-0 libgtk-3-0 \
                libgbm1 ca-certificates fonts-liberation || true
              
              # =========================
              # FRONTEND SETUP
              # =========================
              echo "--- Building Frontend ---"
              cd frontend
              npm install
              npm run build
              
              # =========================
              # BACKEND SETUP
              # =========================
              echo "--- Installing Backend Dependencies ---"
              cd ../backend
              npm install
              
              # =========================
              # PM2 PROCESS MANAGEMENT
              # =========================
              echo "--- Cleaning up old PM2 processes ---"
              
              # Delete OLD duplicate 'movifile' process (was conflicting on port 5000)
              pm2 delete movifile 2>/dev/null || true
              
              # Stop all movifile processes first to avoid port conflicts
              pm2 stop movifile-backend 2>/dev/null || true
              pm2 stop movifile-frontend 2>/dev/null || true
              
              echo "--- Restarting PM2 Services ---"
              
              # Delete and re-create to ensure clean state
              pm2 delete movifile-backend 2>/dev/null || true
              pm2 start server.js --name movifile-backend --cwd ${{ secrets.DEPLOY_PATH }}/backend
              
              pm2 delete movifile-frontend 2>/dev/null || true
              pm2 start "npm start" --name movifile-frontend --cwd ${{ secrets.DEPLOY_PATH }}/frontend
              
              # Save PM2 processes
              pm2 save
              
              # Wait for backend to start and verify health
              echo "--- Verifying Deployment ---"
              sleep 3
              pm2 status
              pm2 logs movifile-backend --lines 5 --nostream
              curl -s http://localhost:5000/health || echo "WARNING: Backend health check failed!"
              
              echo "--- Deployment Complete ---"
