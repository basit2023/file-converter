name: MoviFile Production CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd frontend && npm install
          cd ../backend && npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Test Backend
        run: |
          cd backend
          # Add your test command here if available
          # npm test
