name: MoviFile Production CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # We'll remove caching for now as it's a monorepo setup
          # or handle it differently if needed.

      - name: Install root dependencies
        run: npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build Backend
        run: |
          cd backend
          npm install

  deploy:
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
              # Ensure the deployment path exists
              mkdir -p ${{ secrets.DEPLOY_PATH }}
              cd ${{ secrets.DEPLOY_PATH }}
              
              # Check if it's already a git repository
              if [ ! -d ".git" ]; then
                echo "Initializing project (first time setup)..."
                git clone https://github.com/basit2023/file-converter.git .
              else
                echo "Updating project... here in this line"
                git pull origin master
              fi
              
              # Create production .env files from secrets
              echo "${{ secrets.FRONTEND_ENV }}" > frontend/.env.production
              echo "${{ secrets.BACKEND_ENV }}" > backend/.env.production
              
              # Build and restart frontend
              cd frontend
              npm install
              npm run build
              
              # Build and restart backend
              cd ../backend
              npm install
              
              # Restart using PM2
              pm2 restart movifile-backend --update-env || pm2 start server.js --name movifile-backend
              pm2 restart movifile-frontend --update-env || pm2 start "npm start" --name movifile-frontend
